<!DOCTYPE html>
<html lang="it">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>🧙 Magic Item Builder</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; }
    body {
      font-family: system-ui, sans-serif;
      max-width: 860px;
      margin: 2rem auto;
      padding: 0 1rem;
      background: #f8f9fa;
      color: #212529;
    }
    h1 { margin-bottom: 0.25rem; }
    p.subtitle { color: #6c757d; margin-top: 0; }
    .card {
      background: #fff;
      border: 1px solid #dee2e6;
      border-radius: 8px;
      padding: 1.25rem;
      margin-bottom: 1rem;
    }
    .fields-grid {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 1rem;
      margin-top: 1rem;
    }
    .two-col {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 1rem;
    }
    .col-stack {
      display: flex;
      flex-direction: column;
      gap: 1rem;
    }
    label {
      display: flex;
      flex-direction: column;
      gap: 0.3rem;
      font-size: 0.875rem;
      font-weight: 500;
    }
    input[type="number"], select {
      padding: 0.45rem 0.6rem;
      border: 1px solid #ced4da;
      border-radius: 5px;
      font-size: 0.95rem;
      background: #fff;
    }
    input:disabled, select:disabled {
      background: #e9ecef;
      color: #6c757d;
    }
    button[type="submit"] {
      width: 100%;
      padding: 0.7rem;
      font-size: 1rem;
      cursor: pointer;
      border: none;
      background: #5c6bc0;
      color: #fff;
      border-radius: 6px;
      margin-top: 0.5rem;
      transition: background 0.15s;
    }
    button[type="submit"]:hover { background: #3f4fa8; }
    #extra-fields { display: none; }
    #result { margin-top: 0.5rem; }
    .metric-row { display: flex; gap: 2.5rem; margin-bottom: 1rem; }
    .metric h3 { margin: 0; font-size: 0.75rem; text-transform: uppercase; color: #6c757d; letter-spacing: 0.05em; }
    .metric p  { margin: 0.2rem 0 0; font-size: 1.6rem; font-weight: 700; }
    .details-box {
      background: #eef2ff;
      border-left: 4px solid #5c6bc0;
      border-radius: 0 5px 5px 0;
      padding: 0.75rem 1rem;
      margin: 0.75rem 0;
    }
    .details-box ul { margin: 0; padding-left: 1.2rem; }
    .details-box li { margin: 0.2rem 0; }
    details { margin-top: 0.75rem; }
    details summary { cursor: pointer; color: #5c6bc0; font-size: 0.9rem; }
    details p { margin: 0.4rem 0 0; font-size: 0.9rem; }
    code { background: #e9ecef; padding: 0.15rem 0.35rem; border-radius: 3px; font-size: 0.85em; }
    .error-box {
      background: #fff5f5;
      border-left: 4px solid #e53e3e;
      border-radius: 0 5px 5px 0;
      padding: 0.75rem 1rem;
      color: #c53030;
      white-space: pre-line;
    }
  </style>
</head>
<body>
  <h1>🧙 Magic Item Builder</h1>
  <p class="subtitle">Configura, calcola e genera oggetti magici per D&D 3.5</p>

  <form id="form">
    <div class="card">
      <label>
        📚 Tipo di Oggetto
        <select id="item_type"></select>
      </label>
      <div class="fields-grid" id="fields"></div>
    </div>

    <div class="card" id="extra-fields"></div>

    <button type="submit">✨ Genera Oggetto</button>
  </form>

  <div id="result"></div>

  <script type="module" src="app.js"></script>
</body>
</html>
